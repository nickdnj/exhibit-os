version: "3.8"

services:
  exhibitos:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: exhibitos
    restart: unless-stopped
    ports:
      - "8100:8100"
    volumes:
      - exhibitos_data:/data
    environment:
      - DATABASE_URL=sqlite:////data/exhibitos.db
      - UPLOADS_DIR=/data/uploads
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - DEFAULT_ADMIN_PASSWORD=${DEFAULT_ADMIN_PASSWORD:-exhibitos2026}
      - TAGSMART_API_URL=${TAGSMART_API_URL:-http://host.docker.internal:8080}
      - TAGSMART_API_KEY=${TAGSMART_API_KEY:-}
      - TIMEZONE=${TIMEZONE:-America/New_York}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:8100}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - exhibitos-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

volumes:
  exhibitos_data:
    driver: local

networks:
  exhibitos-net:
    driver: bridge
